<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NCR Review — トレード振り返り</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root{
    --bg:#11151c;
    --panel:#171c25;
    --panel2:#1d232e;
    --line:#2a3140;
    --ink:#e8ecf1;
    --sub:#8a93a6;
    --mono:'IBM Plex Mono',monospace;
    --sans:'IBM Plex Sans JP',sans-serif;
    --win:#3ecf8e;
    --loss:#ef6f6f;
    --accent:#e8a33d;
    --accent2:#5b8def;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:var(--sans); -webkit-font-smoothing:antialiased;
  }
  header{
    padding:18px 16px 14px; border-bottom:1px solid var(--line);
    position:sticky; top:0; background:var(--bg); z-index:10;
  }
  header .eyebrow{
    font-family:var(--mono); font-size:10px; letter-spacing:.12em; color:var(--accent);
    text-transform:uppercase; margin-bottom:4px;
  }
  header h1{ font-size:18px; margin:0; font-weight:600; }
  header .sub{ font-size:11px; color:var(--sub); margin-top:4px; }

  .tabs{ display:flex; gap:6px; padding:10px 16px 0; border-bottom:1px solid var(--line); overflow-x:auto; }
  .tab{
    font-family:var(--mono); font-size:11px; padding:8px 12px; color:var(--sub);
    border:none; background:none; cursor:pointer; white-space:nowrap;
    border-bottom:2px solid transparent;
  }
  .tab.active{ color:var(--ink); border-bottom-color:var(--accent); }

  main{ padding:14px 16px 60px; max-width:900px; margin:0 auto; }
  .panel{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:14px; margin-bottom:14px;
  }
  .panel h2{ font-size:12px; margin:0 0 10px; color:var(--sub); font-weight:600; letter-spacing:.04em; }

  .trade-row{
    display:flex; align-items:center; gap:10px; padding:10px 8px; border-radius:8px;
    cursor:pointer; border:1px solid transparent;
  }
  .trade-row:hover{ background:var(--panel2); border-color:var(--line); }
  .trade-row.selected{ background:var(--panel2); border-color:var(--accent); }
  .trade-sym{ font-family:var(--mono); font-weight:600; font-size:13px; width:74px; flex-shrink:0; }
  .trade-reason{ font-size:10px; color:var(--sub); width:108px; flex-shrink:0; }
  .trade-pnl{ font-family:var(--mono); font-size:12px; font-weight:600; margin-left:auto; }
  .trade-pnl.win{ color:var(--win); }
  .trade-pnl.loss{ color:var(--loss); }
  .trade-meta{ font-size:9px; color:var(--sub); }

  #chartWrap{ position:relative; }
  #chartContainer{ width:100%; height:380px; }
  .chart-legend{
    display:flex; gap:14px; flex-wrap:wrap; font-size:10px; color:var(--sub);
    font-family:var(--mono); margin-top:8px;
  }
  .chart-legend span.dot{ display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; }

  .feature-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px;
  }
  .feature-item{
    background:var(--panel2); border-radius:6px; padding:8px 10px;
  }
  .feature-item .k{ font-size:9px; color:var(--sub); text-transform:uppercase; letter-spacing:.05em; }
  .feature-item .v{ font-family:var(--mono); font-size:13px; margin-top:2px; }

  .stat-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .stat-box{ background:var(--panel2); border-radius:8px; padding:10px; text-align:center; }
  .stat-box .v{ font-family:var(--mono); font-size:18px; font-weight:700; }
  .stat-box .l{ font-size:9px; color:var(--sub); margin-top:2px; }

  table{ width:100%; border-collapse:collapse; font-size:11px; }
  th{ text-align:left; color:var(--sub); font-weight:500; padding:6px 6px; border-bottom:1px solid var(--line); font-size:10px; }
  td{ padding:6px 6px; border-bottom:1px solid var(--line); font-family:var(--mono); }
  .pill{ display:inline-block; padding:2px 7px; border-radius:10px; font-size:9px; background:var(--panel2); color:var(--sub); margin:1px; }

  .empty{ text-align:center; color:var(--sub); font-size:12px; padding:30px 10px; }
  .loading{ text-align:center; color:var(--sub); font-size:11px; padding:20px; font-family:var(--mono); }
  input[type=text]{
    width:100%; background:var(--panel2); border:1px solid var(--line); border-radius:6px;
    color:var(--ink); padding:8px 10px; font-family:var(--mono); font-size:12px; margin-bottom:10px;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">NewCoin Radar / Review</div>
  <h1>トレード振り返り</h1>
  <div class="sub" id="serverStatus">サーバー接続確認中…</div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="history">履歴一覧</button>
  <button class="tab" data-tab="entryQuality">エントリー品質</button>
  <button class="tab" data-tab="signals">弱化シグナル</button>
</div>

<main>

  <div id="tab-history">
    <div class="panel">
      <h2>サーバーURL</h2>
      <input type="text" id="serverUrlInput" value="https://web-production-31186.up.railway.app">
    </div>

    <div id="chartPanel" class="panel" style="display:none">
      <h2 id="chartTitle">チャート</h2>
      <div id="chartWrap">
        <div id="chartContainer"></div>
        <div id="rsiContainer" style="height:100px;margin-top:4px"></div>
        <div id="macdContainer" style="height:100px;margin-top:4px"></div>
      </div>
      <div class="chart-legend">
        <span><span class="dot" style="background:var(--loss)"></span>決済</span>
        <span><span class="dot" style="background:rgba(239,111,111,0.18);border-radius:2px"></span>弱化シグナル2個以上ON</span>
        <span><span class="dot" style="background:rgba(239,111,111,0.35);border-radius:2px"></span>3個以上ON(決済水準)</span>
      </div>
      <div class="feature-grid" id="featureGrid"></div>
    </div>

    <div class="panel">
      <h2>直近の取引（タップでチャート表示）</h2>
      <div id="tradeList" class="loading">読み込み中…</div>
    </div>
  </div>

  <div id="tab-entryQuality" style="display:none">
    <div class="panel">
      <h2>エントリータイプ別</h2>
      <div id="entryTypeTable" class="loading">読み込み中…</div>
    </div>
    <div class="panel">
      <h2>高値圏エントリーの比較</h2>
      <div id="priceRangeTable" class="loading">読み込み中…</div>
    </div>
    <div class="panel">
      <h2>上ヒゲ本数別</h2>
      <div id="upperWickTable" class="loading">読み込み中…</div>
    </div>
  </div>

  <div id="tab-signals" style="display:none">
    <div class="panel">
      <h2>MOMENTUM_LOST シグナル別 的中率</h2>
      <div class="sub" style="font-size:10px;margin-bottom:10px">勝率が低いほど「正しく機能している」シグナル。勝率が高い場合は過敏な誤検知の疑いがあります。</div>
      <div id="signalTable" class="loading">読み込み中…</div>
    </div>
    <div class="panel">
      <h2>シグナル組み合わせパターン</h2>
      <div id="comboTable" class="loading">読み込み中…</div>
    </div>
  </div>

</main>

<script>
let SERVER_URL = document.getElementById('serverUrlInput').value;
let chart = null;
let candleSeries = null;
let rsiChart = null;
let macdChart = null;

// ── RSI・MACD計算(サーバー側server.jsのcalcRSI/calcMACDと同じロジックを再現) ──
function calcRSI(closes, period = 14) {
  const result = new Array(closes.length).fill(null);
  if (closes.length < period + 1) return result;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const diff = closes[i] - closes[i-1];
    if (diff >= 0) gains += diff; else losses -= diff;
  }
  let avgGain = gains / period, avgLoss = losses / period;
  result[period] = avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss));
  for (let i = period + 1; i < closes.length; i++) {
    const diff = closes[i] - closes[i-1];
    const gain = diff >= 0 ? diff : 0;
    const loss = diff < 0 ? -diff : 0;
    avgGain = (avgGain * (period - 1) + gain) / period;
    avgLoss = (avgLoss * (period - 1) + loss) / period;
    result[i] = avgLoss === 0 ? 100 : 100 - (100 / (1 + avgGain / avgLoss));
  }
  return result;
}

function calcEMA(values, period) {
  const k = 2 / (period + 1);
  const result = new Array(values.length).fill(null);
  let ema = values[0];
  result[0] = ema;
  for (let i = 1; i < values.length; i++) {
    ema = values[i] * k + ema * (1 - k);
    result[i] = ema;
  }
  return result;
}

function calcMACDSeries(closes) {
  const ema12 = calcEMA(closes, 12);
  const ema26 = calcEMA(closes, 26);
  const macdLine = closes.map((_, i) => ema12[i] - ema26[i]);
  const signalLine = calcEMA(macdLine, 9);
  const histogram = macdLine.map((v, i) => v - signalLine[i]);
  return { macdLine, signalLine, histogram };
}

document.getElementById('serverUrlInput').addEventListener('change', (e) => {
  SERVER_URL = e.target.value.replace(/\/$/, '');
  init();
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    ['history','entryQuality','signals'].forEach(name => {
      document.getElementById('tab-' + name).style.display = (name === tab.dataset.tab) ? '' : 'none';
    });
    if (tab.dataset.tab === 'entryQuality') loadEntryQuality();
    if (tab.dataset.tab === 'signals') loadSignalAnalysis();
  });
});

async function checkServer() {
  try {
    const res = await fetch(SERVER_URL + '/health', { signal: AbortSignal.timeout(8000) });
    const json = await res.json();
    document.getElementById('serverStatus').textContent = `接続OK（バージョン${json.version || '?'}）`;
  } catch(e) {
    document.getElementById('serverStatus').textContent = '⚠ サーバーに接続できません。URLを確認してください';
  }
}

async function loadTradeList() {
  const el = document.getElementById('tradeList');
  el.innerHTML = '<div class="loading">読み込み中…</div>';
  try {
    const res = await fetch(SERVER_URL + '/api/monitor/entry-quality', { signal: AbortSignal.timeout(10000) });
    const json = await res.json();
    if (!json.success || !json.recentTrades || json.recentTrades.length === 0) {
      el.innerHTML = '<div class="empty">まだ振り返り可能な取引データがありません。<br>エントリー時の形を記録する機能の導入後に発生した取引から、ここに表示されます。</div>';
      return;
    }
    el.innerHTML = '';
    json.recentTrades.forEach(t => {
      const row = document.createElement('div');
      row.className = 'trade-row';
      const isWin = t.pnl >= 0;
      row.innerHTML = `
        <div class="trade-sym">${t.sym}</div>
        <div class="trade-reason">${t.reason}</div>
        <div>
          <div class="trade-meta">${new Date(t.closedAt).toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <div class="trade-pnl ${isWin ? 'win' : 'loss'}">${isWin ? '+' : ''}$${t.pnl.toFixed(2)}</div>
      `;
      row.addEventListener('click', () => {
        document.querySelectorAll('.trade-row').forEach(r => r.classList.remove('selected'));
        row.classList.add('selected');
        showTradeChart(t);
      });
      el.appendChild(row);
    });
  } catch(e) {
    el.innerHTML = '<div class="empty">取得に失敗しました: ' + e.message + '</div>';
  }
}

async function showTradeChart(trade) {
  const panel = document.getElementById('chartPanel');
  panel.style.display = '';
  document.getElementById('chartTitle').textContent = `${trade.sym} — ${trade.reason}`;
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // 特徴量グリッドを表示(まずは一覧から渡されたデータで先に表示する)
  renderFeatureGrid(trade);

  // 個別トレードの詳細(signal_history含む全データ)を取得する
  let detail = null;
  if (trade.id != null) {
    try {
      const dres = await fetch(`${SERVER_URL}/api/chart/trade/${trade.id}`, { signal: AbortSignal.timeout(8000) });
      const djson = await dres.json();
      if (djson.success) detail = djson.trade;
    } catch(e) { /* 詳細が取れなくても、チャート自体は表示を続ける */ }
  }

  // チャート(ローソク足)の初期化
  const container = document.getElementById('chartContainer');
  container.innerHTML = '';
  chart = LightweightCharts.createChart(container, {
    width: container.clientWidth, height: 380,
    layout: { background: { color: '#171c25' }, textColor: '#8a93a6' },
    grid: { vertLines: { color: '#2a3140' }, horzLines: { color: '#2a3140' } },
    timeScale: { timeVisible: true, secondsVisible: false },
  });
  candleSeries = chart.addCandlestickSeries({
    upColor: '#3ecf8e', downColor: '#ef6f6f', borderVisible: false,
    wickUpColor: '#3ecf8e', wickDownColor: '#ef6f6f',
  });

  // RSIパネルの初期化
  const rsiContainer = document.getElementById('rsiContainer');
  rsiContainer.innerHTML = '';
  rsiChart = LightweightCharts.createChart(rsiContainer, {
    width: rsiContainer.clientWidth, height: 100,
    layout: { background: { color: '#171c25' }, textColor: '#8a93a6' },
    grid: { vertLines: { color: '#2a3140' }, horzLines: { color: '#2a3140' } },
    timeScale: { visible: false },
    rightPriceScale: { visible: true },
  });
  const rsiSeries = rsiChart.addLineSeries({ color: '#5b8def', lineWidth: 1.5 });

  // MACDパネルの初期化
  const macdContainer = document.getElementById('macdContainer');
  macdContainer.innerHTML = '';
  macdChart = LightweightCharts.createChart(macdContainer, {
    width: macdContainer.clientWidth, height: 100,
    layout: { background: { color: '#171c25' }, textColor: '#8a93a6' },
    grid: { vertLines: { color: '#2a3140' }, horzLines: { color: '#2a3140' } },
    timeScale: { timeVisible: true, secondsVisible: false },
    rightPriceScale: { visible: true },
  });
  const histSeries = macdChart.addHistogramSeries({ color: '#5b8def' });

  try {
    const res = await fetch(`${SERVER_URL}/api/chart/candles?symbol=${trade.sym}&limit=200`, { signal: AbortSignal.timeout(10000) });
    const json = await res.json();
    if (json.success && json.candles && json.candles.length) {
      const data = json.candles.map(c => ({
        time: Math.floor(c.time / 1000), open: c.open, high: c.high, low: c.low, close: c.close,
      }));
      candleSeries.setData(data);

      // 決済時点に最も近いローソク足を見つけ、マーカーを置く
      const closedAtSec = Math.floor(new Date(trade.closedAt).getTime() / 1000);
      const exitCandle = data.reduce((closest, c) => Math.abs(c.time - closedAtSec) < Math.abs(closest.time - closedAtSec) ? c : closest, data[0]);
      candleSeries.setMarkers([{ time: exitCandle.time, position: 'aboveBar', color: '#ef6f6f', shape: 'arrowDown', text: '決済 ' + trade.reason }]);

      // RSI・MACDをフロント側で計算して描画(サーバーと同じロジック)
      const closes = json.candles.map(c => c.close);
      const rsiValues = calcRSI(closes, 14);
      rsiSeries.setData(data.map((d, i) => ({ time: d.time, value: rsiValues[i] })).filter(d => d.value != null));

      const { histogram } = calcMACDSeries(closes);
      histSeries.setData(data.map((d, i) => ({
        time: d.time, value: histogram[i] || 0,
        color: (histogram[i] || 0) >= 0 ? '#3ecf8e' : '#ef6f6f',
      })));

      // 保有中の弱化シグナル推移を背景色で表示する(signal_historyがあれば)
      if (detail && Array.isArray(detail.signal_history) && detail.signal_history.length) {
        const markers = [];
        // entryマーカーも追加する
        const entryTimeSec = Math.floor((detail.signal_history[0].t) / 1000);
        const entryCandle = data.reduce((closest, c) => Math.abs(c.time - entryTimeSec) < Math.abs(closest.time - entryTimeSec) ? c : closest, data[0]);
        markers.push({ time: entryCandle.time, position: 'belowBar', color: '#3ecf8e', shape: 'arrowUp', text: 'エントリー' });

        // 各スナップショット時点でのsignalCountに応じて背景のマーカーを置く(簡易的に、対応するローソク足にマーカーで表示)
        detail.signal_history.forEach(snap => {
          if (snap.signalCount >= 2) {
            const tSec = Math.floor(snap.t / 1000);
            const nearest = data.reduce((closest, c) => Math.abs(c.time - tSec) < Math.abs(closest.time - tSec) ? c : closest, data[0]);
            markers.push({
              time: nearest.time, position: 'inBar',
              color: snap.signalCount >= 3 ? 'rgba(239,111,111,0.9)' : 'rgba(239,111,111,0.5)',
              shape: 'circle', text: `${snap.signalCount}個ON`,
            });
          }
        });
        markers.sort((a,b) => a.time - b.time);
        candleSeries.setMarkers(markers);
      }

      [chart, rsiChart, macdChart].forEach(c => c.timeScale().fitContent());
      // 3つのチャートの時間軸を同期させる
      chart.timeScale().subscribeVisibleLogicalRangeChange(range => {
        if (range) { rsiChart.timeScale().setVisibleLogicalRange(range); macdChart.timeScale().setVisibleLogicalRange(range); }
      });
    }
  } catch(e) {
    container.innerHTML = '<div class="empty">チャートデータの取得に失敗しました: ' + e.message + '</div>';
  }
}

function renderFeatureGrid(trade) {
  const grid = document.getElementById('featureGrid');
  grid.innerHTML = '';
  const items = [
    ['エントリータイプ', trade.entryType || '(型なし)'],
    ['RSI(エントリー時)', trade.rsi != null ? trade.rsi : '—'],
    ['上ヒゲ本数(直近5本)', trade.upperWickCountLast5 != null ? trade.upperWickCountLast5 : '—'],
    ['出来高比', trade.volumeRatio != null ? trade.volumeRatio : '—'],
    ['24H高値圏位置(%)', trade.priceRangePosition != null ? trade.priceRangePosition : '—'],
    ['損益率', trade.pnlPct != null ? trade.pnlPct.toFixed(1) + '%' : '—'],
  ];
  items.forEach(([k,v]) => {
    const div = document.createElement('div');
    div.className = 'feature-item';
    div.innerHTML = `<div class="k">${k}</div><div class="v">${v}</div>`;
    grid.appendChild(div);
  });
  if (trade.boosterReasons && trade.boosterReasons.length) {
    const div = document.createElement('div');
    div.className = 'feature-item';
    div.style.gridColumn = '1 / -1';
    div.innerHTML = `<div class="k">Boosterの理由</div><div class="v" style="font-size:10px">${trade.boosterReasons.map(r=>`<span class="pill">${r}</span>`).join('')}</div>`;
    grid.appendChild(div);
  }
  if (trade.penaltyReasons && trade.penaltyReasons.length) {
    const div = document.createElement('div');
    div.className = 'feature-item';
    div.style.gridColumn = '1 / -1';
    div.innerHTML = `<div class="k">Penaltyの理由</div><div class="v" style="font-size:10px">${trade.penaltyReasons.map(r=>`<span class="pill">${r}</span>`).join('')}</div>`;
    grid.appendChild(div);
  }
}

async function loadEntryQuality() {
  try {
    const res = await fetch(SERVER_URL + '/api/monitor/entry-quality', { signal: AbortSignal.timeout(10000) });
    const json = await res.json();
    if (!json.success) throw new Error('取得失敗');

    document.getElementById('entryTypeTable').innerHTML = renderTable(
      ['タイプ','件数','勝率','平均損益'],
      json.entryTypeBreakdown.map(g => [g.entryType, g.count, g.winRate+'%', '$'+g.avgPnl])
    );

    const pr = json.priceRangeComparison;
    document.getElementById('priceRangeTable').innerHTML = renderTable(
      ['区分','件数','勝率','平均損益'],
      [
        [pr.nearHigh.label, pr.nearHigh.count, pr.nearHigh.winRate+'%', '$'+pr.nearHigh.avgPnl],
        [pr.notNearHigh.label, pr.notNearHigh.count, pr.notNearHigh.winRate+'%', '$'+pr.notNearHigh.avgPnl],
      ]
    );

    document.getElementById('upperWickTable').innerHTML = renderTable(
      ['上ヒゲ本数','件数','勝率','平均損益'],
      json.upperWickBreakdown.map(g => [g.upperWickCount, g.count, g.winRate+'%', '$'+g.avgPnl])
    );
  } catch(e) {
    document.getElementById('entryTypeTable').innerHTML = '<div class="empty">取得に失敗しました</div>';
  }
}

async function loadSignalAnalysis() {
  try {
    const res = await fetch(SERVER_URL + '/api/monitor/signal-analysis', { signal: AbortSignal.timeout(10000) });
    const json = await res.json();
    if (!json.success) throw new Error('取得失敗');

    document.getElementById('signalTable').innerHTML = renderTable(
      ['シグナル','発火件数','発火率','勝率','平均損益'],
      json.signalStats.map(s => [s.signal, s.count, s.occurrenceRate+'%', s.winRate+'%', '$'+s.avgPnl])
    );

    document.getElementById('comboTable').innerHTML = renderTable(
      ['組み合わせ','件数','勝率','平均損益'],
      json.comboBreakdown.map(c => [c.combo, c.count, c.winRate+'%', '$'+c.avgPnl])
    );
  } catch(e) {
    document.getElementById('signalTable').innerHTML = '<div class="empty">取得に失敗しました</div>';
  }
}

function renderTable(headers, rows) {
  if (!rows.length) return '<div class="empty">データがありません</div>';
  let html = '<table><thead><tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
  rows.forEach(r => {
    html += '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>';
  });
  html += '</tbody></table>';
  return html;
}
